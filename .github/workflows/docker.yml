# Publishes the official brikie image to GitHub Container Registry on
# every push to master (and version tags). Uses the workflow's own
# GITHUB_TOKEN — no extra secrets needed. NOTE: the ghcr package is
# private after the first push until made public in repo Settings →
# Packages.
name: docker

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/veelacleave/brikie:latest
            ghcr.io/veelacleave/brikie:0.1.0
